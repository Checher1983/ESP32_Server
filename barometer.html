<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; }
        body { 
            background-color: #E4EAF6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: sans-serif; 
        }
        
        main { text-align: center; padding: 10px; width: 100%; max-width: 400px; }
        
        .card {
            background-color: #B2F2BB; 
            padding: 10px;
            border-radius: 25px;
            margin-bottom: 10px;
            border: 1px solid #99d9a4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Стиль для дати та часу (червоні значення) */
        .header-label { font-size: 1.2em; color: black; }
        .header-value { color: red; font-weight: bold; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .section-title {
            color: #21B1FF;
            font-weight: bold;
            text-decoration: underline;
            text-transform: uppercase;
            font-size: 1em;
            margin-bottom: 5px;
            display: inline-block;
        }

        .sensor-row { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 5px 0;
            font-size: 1.2em;
        }

        .sensor-value { color: red; font-weight: bold; }
        
        .icon-temp { width: 10px; height: auto; }
        .icon-drop { width: 22px; height: auto; }

        .battery-bar { 
            width: 35px; height: 16px; border: 1.5px solid black; border-radius: 3px; 
            position: relative; background: white; display: inline-block;
        }
        .battery-level { height: 100%; background: #00FF00; width: 0%; transition: 0.5s; }

        /* Стиль кнопок */
        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 12px; 
            border-radius: 12px; border: 2px solid black; font-weight: bold; width: 300px; 
            display: inline-block
