<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; }
        .btn { 
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 12px 10px; 
            border-radius: 8px; border: 2px solid black; font-weight: bold; width: 260px; 
            display: inline-block; transition: 0.3s; text-align: center; box-sizing: border-box; 
            margin-top: 15px; font-family: sans-serif;
        }
        .btn:hover { background-color: #28a745; }
        .btn:active { background-color: yellow; color: #21B1FF; }
        .sensor-label { color: black; margin: 8px 0; font-family: sans-serif; font-size: 16px; }
        .sensor-value { color: red; font-weight: bold; }
        
        /* КОЛІР ЗІ СКРИНШОТУ */
        .section-card { 
            background: #B2F2BB; 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid #99d9a4; 
            margin-bottom: 15px; 
        }
        
        .section-title { color: #21B1FF; font-weight: bold; margin-bottom: 10px; text-decoration: underline; text-transform: uppercase; }
        #status-footer { font-size: 11px; font-weight: bold; color: gray; margin-top: 20px; font-family: sans-serif; }
    </style>
</head>
<body style="background-color: #E4EAF6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">
    <main style="text-align: center; padding: 20px; width: 100%; max-width: 380px;">
        <h1 style="margin-bottom: 20px;">МЕТЕОСТАНЦІЯ</h1>
        
        <div class="section-card">
            <div class="sensor-label">Дата: <span id="date" class="sensor-value">...</span></div>
            <div class="sensor-label">Час: <span id="time" class="sensor-value">...</span></div>
            <div style="margin-top: 10px; border-top: 1px dotted #99d9a4; padding-top: 10px;">
                <div class="sensor-label">Атмосферний тиск: <span id="pres" class="sensor-value">...</span> мм.рт.ст.</div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">Вулиця</div>
            <div class="sensor-label">Температура: <span id="t_ext" class="sensor-value">...</span> °C</div>
            <div class="sensor-label">Вологість: <span id="h_ext" class="sensor-value">...</span> %</div>
            <div class="sensor-label" style="font-size: 12px; color: #666;">Заряд батареї: <span id="bat_ext">...</span>%</div>
        </div>

        <div class="section-card">
            <div class="section-title">Коридор</div>
            <div class="sensor-label">Температура: <span id="t_kor" class="sensor-value">...</span> °C</div>
            <div class="sensor-label">Вологість: <span id="h_kor" class="sensor-value">...</span> %</div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; margin-top: 10px;">
            <a href="logs.html" class="btn">Журнал та графіки</a>
            <a href="index.html" class="btn">На головну</a>
        </div>
        <div id="status-footer">Статус: <span id="mqtt-status">Підключення...</span></div>
    </main>

    <script>
        const statusText = document.getElementById('mqtt-status');
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: 'Web_Station_' + Math.random().toString(16).substr(2, 8)
        });
        let lastUpdate = Date.now();

        client.on('connect', () => {
            statusText.innerText = 'Онлайн';
            statusText.parentElement.style.color = '#08DD08'; 
            client.subscribe('7091003_Checher_ESP32/all_data');
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                lastUpdate = Date.now();
                statusText.innerText = 'Онлайн';
                statusText.parentElement.style.color = '#08DD08';

                // Головна картка
                document.getElementById('date').innerText = data.date;
                document.getElementById('time').innerText = data.time;
                document.getElementById('pres').innerText = data.korydor.p;

                // Вулиця
                const te = parseFloat(data.vulytsia.t);
                document.getElementById('t_ext').innerText = isNaN(te) ? data.vulytsia.t : te.toFixed(1);
                document.getElementById('h_ext').innerText = data.vulytsia.h;
                document.getElementById('bat_ext').innerText = data.vulytsia.b;

                // Коридор
                const tk = parseFloat(data.korydor.t);
                document.getElementById('t_kor').innerText = isNaN(tk) ? data.korydor.t : tk.toFixed(1);
                document.getElementById('h_kor').innerText = data.korydor.h;

            } catch (e) { console.error("JSON Parse Error", e); }
        });

        setInterval(() => {
            if (Date.now() - lastUpdate > 15000) {
                const ids = ['date','time','pres','t_kor','h_kor','t_ext','h_ext','bat_ext'];
                ids.forEach(id => document.getElementById(id).innerText = 'No Data');
                statusText.innerText = 'Офлайн (ESP32 вимкнена)';
                statusText.parentElement.style.color = 'red';
            }
        }, 5000);
    </script>
</body>
</html>
