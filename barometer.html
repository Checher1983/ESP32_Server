<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Метеостанція Checher</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eceff1; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; }
        .date-time { font-size: 1.2em; color: #d32f2f; font-weight: bold; margin-bottom: 5px; }
        .pressure { font-size: 1.1em; color: #455a64; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #f8f9fa; padding: 15px; border-radius: 15px; border-left: 5px solid #2196f3; transition: 0.3s; }
        .card.active { border-left-color: #4caf50; }
        .card h4 { margin: 0 0 10px 0; font-size: 0.9em; color: #78909c; text-transform: uppercase; }
        .temp { font-size: 1.8em; font-weight: bold; color: #333; }
        .hum { font-size: 1.1em; color: #0288d1; }
        .meta { font-size: 0.75em; color: #999; margin-top: 10px; }
        .kor-card { grid-column: span 2; background: #e8f5e9; border-left-color: #4caf50; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="date-time"><span id="date">--.--.----</span> | <span id="time">--:--:--</span></div>
        <div class="pressure">Тиск: <span id="pres">--</span> мм.рт.ст.</div>
    </div>

    <div class="grid">
        <div class="card kor-card">
            <h4>Коридор (PCBA)</h4>
            <div id="t_kor" class="temp">--.- °C</div>
            <div id="h_kor" class="hum">-- %</div>
        </div>

        <div class="card" id="card_ext">
            <h4>Вулиця</h4>
            <div id="t_ext" class="temp">--.-</div>
            <div id="h_ext" class="hum">--</div>
            <div class="meta">RSSI: <span id="rssi_ext">--</span> | Bat: <span id="bat_ext">--</span>%</div>
        </div>

        <div class="card" id="card_room">
            <h4>Кімната</h4>
            <div id="t_room" class="temp">--.-</div>
            <div id="h_room" class="hum">--</div>
            <div class="meta">RSSI: <span id="rssi_room">--</span> | Bat: <span id="bat_room">--</span>%</div>
        </div>

        <div class="card" id="card_kit">
            <h4>Кухня</h4>
            <div id="t_kit" class="temp">--.-</div>
            <div id="h_kit" class="hum">--</div>
            <div class="meta">RSSI: <span id="rssi_kit">--</span> | Bat: <span id="bat_kit">--</span>%</div>
        </div>

        <div class="card" id="card_bath">
            <h4>Ванна</h4>
            <div id="t_bath" class="temp">--.-</div>
            <div id="h_bath" class="hum">--</div>
            <div class="meta">RSSI: <span id="rssi_bath">--</span> | Bat: <span id="bat_bath">--</span>%</div>
        </div>
    </div>
</div>

<script>
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    const topic = "7091003_Checher_ESP32/all_data";

    client.on('connect', () => {
        console.log("MQTT Connected");
        client.subscribe(topic);
    });

    client.on('message', (t, msg) => {
        try {
            const data = JSON.parse(msg.toString());
            console.log("Data Recv:", data);

            // Основне
            document.getElementById('date').innerText = data.date;
            document.getElementById('time').innerText = data.time;
            document.getElementById('pres').innerText = data.korydor?.p || "--";

            // Коридор
            if (data.korydor) {
                document.getElementById('t_kor').innerText = data.korydor.t + " °C";
                document.getElementById('h_kor').innerText = data.korydor.h + " %";
            }

            // Динамічні зони
            // Ключ у JSON : ID у HTML
            const sensors = {
                vulytsia: 'ext',
                room: 'room',
                kitchen: 'kit',
                bath: 'bath'
            };

            Object.keys(sensors).forEach(key => {
                const id = sensors[key];
                const val = data[key];
                const card = document.getElementById('card_' + id);
                
                if (val && val.t !== undefined) {
                    document.getElementById('t_' + id).innerText = val.t + " °C";
                    document.getElementById('h_' + id).innerText = val.h + " %";
                    document.getElementById('rssi_' + id).innerText = val.rssi;
                    document.getElementById('bat_' + id).innerText = val.b;
                    card.classList.add('active');
                } else {
                    document.getElementById('t_' + id).innerText = "OFFLINE";
                    card.classList.remove('active');
                }
            });

        } catch (e) {
            console.error("JSON Error", e);
        }
    });
</script>

</body>
</html>
