<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Барометр - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        .btn { 
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 12px 10px; 
            border-radius: 8px; border: 2px solid black; font-weight: bold; width: 260px; 
            display: inline-block; transition: 0.3s; text-align: center; box-sizing: border-box; 
            margin-top: 15px; font-family: sans-serif; user-select: none; -webkit-user-select: none;
        }
        .btn:hover { background-color: #28a745; }
        .btn:active { background-color: yellow; color: #21B1FF; }
        .sensor-label { color: black; margin: 8px 0; font-family: sans-serif; font-size: 16px; }
        .sensor-value { color: red; font-weight: bold; }
        .section-title { color: #21B1FF; margin-top: 20px; text-decoration: underline; font-size: 18px; }
        #status-footer { font-size: 11px; font-weight: bold; color: gray; margin-top: 20px; font-family: sans-serif; }
    </style>
</head>
<body style="background-color: #E4EAF6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">
    <main style="text-align: center; padding: 20px; width: 100%; max-width: 400px;">
        <h1 style="margin-bottom: 10px;">МЕТЕОСТАНЦІЯ</h1>
        
        <div style="margin-bottom: 15px; background: white; padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
            <div class="sensor-label">Дата: <span id="date" class="sensor-value">...</span></div>
            <div class="sensor-label">Час: <span id="time" class="sensor-value">...</span></div>
        </div>

        <div style="background: white; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 15px;">
            <div class="section-title">КОРИДОР</div>
            <div class="sensor-label">Температура: <span id="temp_kor" class="sensor-value">...</span> °C</div>
            <div class="sensor-label">Вологість: <span id="hum_kor" class="sensor-value">...</span> %</div>
            <div class="sensor-label">Тиск: <span id="pres_kor" class="sensor-value">...</span> мм.рт.ст.</div>
        </div>

        <div style="background: white; padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
            <div class="section-title">ВУЛИЦЯ</div>
            <div class="sensor-label">Температура: <span id="temp_ext" class="sensor-value">...</span> °C</div>
            <div class="sensor-label">Вологість: <span id="hum_ext" class="sensor-value">...</span> %</div>
            <div class="sensor-label">Заряд батареї: <span id="bat_ext" class="sensor-value">...</span> %</div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; margin-top: 20px;">
            <a href="logs.html" class="btn">Журнал та графіки</a>
            <a href="index.html" class="btn">На головну</a>
        </div>
        <div id="status-footer">Статус: <span id="mqtt-status">Підключення...</span></div>
    </main>

    <script>
        const statusText = document.getElementById('mqtt-status');
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: 'Web_Station_' + Math.random().toString(16).substr(2, 8)
        });
        let lastUpdate = Date.now();

        client.on('connect', () => {
            statusText.innerText = 'Онлайн';
            statusText.parentElement.style.color = '#08DD08'; 
            client.subscribe('7091003_Checher_ESP32/all_data');
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                lastUpdate = Date.now();
                statusText.innerText = 'Онлайн';
                statusText.parentElement.style.color = '#08DD08';

                // Загальні дані
                document.getElementById('date').innerText = data.date;
                document.getElementById('time').innerText = data.time;

                // Коридор (BME280)
                const tK = parseFloat(data.korydor.t);
                document.getElementById('temp_kor').innerText = isNaN(tK) ? data.korydor.t : tK.toFixed(1);
                document.getElementById('hum_kor').innerText = data.korydor.h;
                document.getElementById('pres_kor').innerText = data.korydor.p;

                // Вулиця (ESP-NOW) - виведе "No Data" якщо BT вимкнена
                const tE = parseFloat(data.vulytsia.t);
                document.getElementById('temp_ext').innerText = isNaN(tE) ? data.vulytsia.t : tE.toFixed(1);
                document.getElementById('hum_ext').innerText = data.vulytsia.h;
                document.getElementById('bat_ext').innerText = data.vulytsia.b;

            } catch (e) { console.error("JSON Error", e); }
        });

        setInterval(() => {
            if (Date.now() - lastUpdate > 15000) {
                const ids = ['date','time','temp_kor','hum_kor','pres_kor','temp_ext','hum_ext','bat_ext'];
                ids.forEach(id => document.getElementById(id).innerText = 'No Data');
                statusText.innerText = 'Офлайн (ESP32 вимкнена)';
                statusText.parentElement.style.color = 'red';
            }
        }, 5000);
    </script>
</body>
</html>
