<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background-color: #E4EAF6; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; overflow: hidden; 
        }
        main { text-align: center; padding: 5px; width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 1.6em; margin: 5px 0; }

        .card {
            background-color: #B2F2BB; padding: 6px 10px; border-radius: 20px;
            margin-bottom: 5px; border: 1px solid #99d9a4; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header-label { font-size: 1.2em; color: black; line-height: 1.2; }
        .header-value { color: red; font-weight: bold; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 5px; }

        .section-title {
            color: #21B1FF; font-weight: bold; text-decoration: underline;
            text-transform: uppercase; font-size: 1em; margin-bottom: 4px; display: block;
        }

        .sensor-line { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 2px 0; font-size: 1.3em; }
        .sensor-value { color: red; font-weight: bold; }
        .unit { font-size: 0.8em; color: black; font-weight: bold; margin-left: -2px; }
        
        .icon-temp { width: 10px; height: auto; }
        .icon-drop { width: 20px; height: auto; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; padding-top: 3px; border-top: 1px solid rgba(0,0,0,0.05); }

        /* Стиль батарейки з "+" контактом */
        .battery-container { display: flex; align-items: center; gap: 1px; }
        .battery-body { 
            width: 28px; height: 14px; border: 1.5px solid black; border-radius: 2px; 
            position: relative; background: white; overflow: hidden;
        }
        .battery-level { height: 100%; width: 0%; transition: 0.5s; }
        .battery-tip { width: 2px; height: 6px; background: black; border-radius: 0 1px 1px 0; }

        .rssi-text { font-size: 0.75em; color: #444; font-weight: bold; }

        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 10px; 
            border-radius: 12px; border: 2px solid black; font-weight: bold; width: 300px; 
            display: inline-block; margin-top: 6px; font-size: 1.1em;
        }

        .status-waiting { color: #888888; }
        .status-online { color: #08DD08; }
        .status-offline { color: #FF0000; }
        #status-text { font-size: 13px; font-weight: bold; margin-top: 6px; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>

        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 4px; padding-top: 4px; font-size: 1.1em;">
                Тиск: <span id="pres" class="sensor-value">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container">
            <script>
                const zones = [
                    {id: 'ext', name: 'ВУЛИЦЯ'}, {id: 'room', name: 'КІМНАТА'},
                    {id: 'kit', name: 'КУХНЯ'}, {id: 'bath', name: 'ВАННА'}
                ];
                zones.forEach(z => {
                    document.write(`
                        <div class="card">
                            <span class="section-title">${z.name}</span>
                            <div class="sensor-line"><img id="t_${z.id}_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_${z.id}" class="sensor-value">...</span><span class="unit">°C</span></div>
                            <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_${z.id}" class="sensor-value">...</span><span class="unit">%</span></div>
                            <div class="card-footer">
                                <span class="rssi-text">BLE: <span id="rssi_${z.id}">...</span></span>
                                <div class="battery-container">
                                    <div class="battery-body"><div id="bat_level_${z.id}" class="battery-level"></div></div>
                                    <div class="battery-tip"></div>
                                    <span id="bat_text_${z.id}" style="font-size: 0.7em; font-weight: bold; margin-left: 2px;">...%</span>
                                </div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="card" style="max-width: 180px; margin: 0 auto 5px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line"><img id="t_kor_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kor" class="sensor-value">...</span><span class="unit">°C</span></div>
            <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_kor" class="sensor-value">...</span><span class="unit">%</span></div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <a href="logs.html" class="btn">Журнал та графіки</a>
            <a href="index.html" class="btn">На головну</a>
        </div>
        <div id="status-text" class="status-waiting">Статус: Очікування даних...</div>
    </main>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const statusEl = document.getElementById('status-text');
        
        function validate(val) {
            return (val === undefined || val === null || isNaN(parseFloat(val))) ? "..." : val;
        }

        function formatTemp(value) {
            let v = validate(value);
            if (v === "...") return "...";
            let num = parseFloat(v);
            return num > 0 ? "+" + num.toFixed(1) : (num === 0 ? "0.0" : num.toFixed(1));
        }

        function updateTemp(id, value, iconId) {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            el.innerText = formatTemp(value);
            if (validate(value) !== "...") {
                icon.src = parseFloat(value) < 0 ? 'img/Temp_Low.png' : 'img/Temp_High.png';
            }
        }

        function updateBattery(levelId, textId, value) {
            const bar = document.getElementById(levelId);
            const text = document.getElementById(textId);
            let v = validate(value);
            
            if (v === "...") {
                text.innerText = "...%";
                bar.style.width = "0%";
                bar.style.backgroundColor = "white"; // Білий якщо No Data
                return;
            }
            
            let val = parseInt(v);
            text.innerText = val + '%';
            bar.style.width = val + '%';
            
            // Логіка кольорів за вашим запитом
            if (val >= 70) bar.style.backgroundColor = "#00FF00"; // Зелений
            else if (val >= 20) bar.style.backgroundColor = "orange"; // Оранжевий
            else bar.style.backgroundColor = "red"; // Червоний
        }

        client.on('connect', () => {
            client.subscribe('7091003_Checher_ESP32/all_data');
            statusEl.innerText = "Статус: Онлайн"; statusEl.className = "status-online";
        });

        client.on('message', (topic, message) => {
            try {
                const d = JSON.parse(message.toString());
                document.getElementById('date').innerText = validate(d.date);
                document.getElementById('time').innerText = validate(d.time);
                document.getElementById('pres').innerText = validate(d.korydor?.p);

                updateTemp('t_ext', d.vulytsia?.t, 't_ext_icon');
                document.getElementById('h_ext').innerText = validate(d.vulytsia?.h);
                updateBattery('bat_level_ext', 'bat_text_ext', d.vulytsia?.b);
                document.getElementById('rssi_ext').innerText = validate(d.vulytsia?.rssi);

                updateTemp('t_kor', d.korydor?.t, 't_kor_icon');
                document.getElementById('h_kor').innerText = validate(d.korydor?.h);

                updateTemp('t_room', d.room?.t, 't_room_icon');
                document.getElementById('h_room').innerText = validate(d.room?.h);
                updateBattery('bat_level_room', 'bat_text_room', d.room?.b);
                document.getElementById('rssi_room').innerText = validate(d.room?.rssi);

                updateTemp('t_kit', d.kitchen?.t, 't_kit_icon');
                document.getElementById('h_kit').innerText = validate(d.kitchen?.h);
                updateBattery('bat_level_kit', 'bat_text_kit', d.kitchen?.b);
                document.getElementById('rssi_kit').innerText = validate(d.kitchen?.rssi);

                updateTemp('t_bath', d.bath?.t, 't_bath_icon');
                document.getElementById('h_bath').innerText = validate(d.bath?.h);
                updateBattery('bat_level_bath', 'bat_text_bath', d.bath?.b);
                document.getElementById('rssi_bath').innerText = validate(d.bath?.rssi);

            } catch (e) { console.log("JSON error"); }
