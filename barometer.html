<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція PCBA Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background-color: #E4EAF6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        main { text-align: center; padding: 10px; width: 100%; max-width: 420px; }
        h1 { color: #333; font-size: 1.5em; margin: 10px 0; }
        .card { background-color: #B2F2BB; padding: 10px; border-radius: 20px; margin-bottom: 8px; border: 1px solid #99d9a4; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-label { font-size: 1.1em; color: black; font-weight: bold; }
        .header-value { color: #d00; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .section-title { color: #21B1FF; font-weight: bold; text-decoration: underline; text-transform: uppercase; font-size: 0.9em; margin-bottom: 5px; display: block; }
        .sensor-line { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 3px 0; font-size: 1.2em; }
        .sensor-value { font-weight: bold; }
        .unit { font-size: 0.8em; color: #555; margin-left: 2px; }
        .icon-img { width: 20px; height: auto; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 0.75em; }
        .battery-body { width: 24px; height: 12px; border: 1.5px solid #333; border-radius: 2px; position: relative; background: white; }
        .battery-level { height: 100%; transition: width 0.5s; }
        .btn { text-decoration: none; background-color: #21B1FF; color: white; padding: 12px; border-radius: 12px; border: 1px solid #007cc3; font-weight: bold; width: 100%; display: inline-block; margin-top: 10px; }
        .status-online { color: #00aa00; font-weight: bold; }
        .status-offline { color: #ff0000; font-weight: bold; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>
        
        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 5px; padding-top: 5px;">
                Тиск: <span id="pres" class="sensor-value" style="color:#d00;">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container" id="zones-grid">
            </div>

        <div class="card" style="max-width: 200px; margin: 0 auto 10px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line"><span id="t_kor" class="sensor-value">...</span><span class="unit">°C</span></div>
            <div class="sensor-line"><span id="h_kor" class="sensor-value">...</span><span class="unit">%</span></div>
        </div>

        <div id="status-text" class="status-offline">Статус: Підключення...</div>
        <a href="logs.html" class="btn">Журнал та графіки</a>
    </main>

    <script>
        // Створюємо картки для зон
        const zoneConfigs = [
            {id: 'ext', name: 'ВУЛИЦЯ'}, {id: 'room', name: 'КІМНАТА'}, 
            {id: 'kit', name: 'КУХНЯ'}, {id: 'bath', name: 'ВАННА'}
        ];
        
        const grid = document.getElementById('zones-grid');
        zoneConfigs.forEach(z => {
            grid.innerHTML += `
                <div class="card">
                    <span class="section-title">${z.name}</span>
                    <div class="sensor-line"><span id="t_${z.id}" class="sensor-value">...</span><span class="unit">°C</span></div>
                    <div class="sensor-line"><span id="h_${z.id}" class="sensor-value">...</span><span class="unit">%</span></div>
                    <div class="card-footer">
                        <span>RSSI: <span id="rssi_${z.id}">...</span></span>
                        <div style="display: flex; align-items: center; gap: 3px;">
                            <div class="battery-body"><div id="bat_level_${z.id}" class="battery-level"></div></div>
                            <span id="bat_text_${z.id}">...%</span>
                        </div>
                    </div>
                </div>`;
        });

        // Налаштування MQTT з випадковим ID для уникнення конфліктів
        const clientId = 'web_client_' + Math.random().toString(16).substring(2, 8);
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clientId });

        function updateElement(id, value, isTemp = false) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value === null || value === undefined) {
                el.innerText = "...";
                el.style.color = "black";
                return;
            }
            let v = parseFloat(value);
            el.innerText = isTemp ? (v > 0 ? "+" + v.toFixed(1) : v.toFixed(1)) : value;
            if (isTemp) {
                el.style.color = v >= 25 ? "#FF0000" : (v >= 18 ? "#007F0E" : "#21B1FF");
            }
        }

        client.on('connect', () => {
            document.getElementById('status-text').innerText = "Статус: Онлайн";
            document.getElementById('status-text').className = "status-online";
            client.subscribe('7091003_Checher_ESP32/all_data');
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                
                // Загальні дані
                document.getElementById('date').innerText = data.date || "...";
                document.getElementById('time').innerText = data.time || "...";
                updateElement('pres', data.korydor?.p);
                updateElement('t_kor', data.korydor?.t, true);
                updateElement('h_kor', data.korydor?.h);

                // Мапінг JSON -> HTML IDs
                const mapping = {
                    vulytsia: 'ext',
                    room: 'room',
                    kitchen: 'kit',
                    bath: 'bath'
                };

                Object.keys(mapping).forEach(jsonKey => {
                    const htmlId = mapping[jsonKey];
                    const z = data[jsonKey];
                    
                    updateElement('t_' + htmlId, z?.t, true);
                    updateElement('h_' + htmlId, z?.h);
                    
                    if (document.getElementById('rssi_' + htmlId)) {
                        document.getElementById('rssi_' + htmlId).innerText = z?.rssi || "...";
                    }

                    // Батарея
                    const bar = document.getElementById('bat_level_' + htmlId);
                    const txt = document.getElementById('bat_text_' + htmlId);
                    if (bar && txt) {
                        let b = z?.b || 0;
                        txt.innerText = b + "%";
                        bar.style.width = b + "%";
                        bar.style.backgroundColor = b > 70 ? "#08DD08" : (b > 25 ? "#FFD700" : "#FF0000");
                    }
                });
            } catch (e) { console.error("Data error:", e); }
        });

        client.on('offline', () => {
            document.getElementById('status-text').innerText = "Статус: Офлайн";
            document.getElementById('status-text').className = "status-offline";
        });
    </script>
</body>
</html>
