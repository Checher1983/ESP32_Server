<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background-color: #E4EAF6; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        
        main { text-align: center; padding: 5px; width: 100%; max-width: 400px; }
        
        h1 { color: #333; font-size: 1.6em; margin: 5px 0; }

        .card {
            background-color: #B2F2BB; 
            padding: 6px 10px;
            border-radius: 20px;
            margin-bottom: 5px;
            border: 1px solid #99d9a4;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header-label { font-size: 1.2em; color: black; line-height: 1.2; }
        .header-value { color: red; font-weight: bold; }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 5px;
        }

        .section-title {
            color: #21B1FF;
            font-weight: bold;
            text-decoration: underline;
            text-transform: uppercase;
            font-size: 1em;
            margin-bottom: 4px;
            display: block;
        }

        /* Новий компактний стиль рядка датчика */
        .sensor-line { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin: 2px 0;
            font-size: 1.3em; /* Збільшений шрифт */
        }

        .sensor-value { color: red; font-weight: bold; }
        .unit { font-size: 0.8em; color: black; font-weight: bold; margin-left: -2px; }
        
        .icon-temp { width: 10px; height: auto; }
        .icon-drop { width: 20px; height: auto; }

        /* Футер картки для BLE та батареї */
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            padding-top: 3px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .battery-bar { 
            width: 28px; height: 13px; border: 1.2px solid black; border-radius: 2px; 
            position: relative; background: white; display: inline-block;
        }
        .battery-level { height: 100%; background: #00FF00; width: 0%; transition: 0.5s; }
        .rssi-text { font-size: 0.75em; color: #444; font-weight: bold; }

        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 10px; 
            border-radius: 12px; border: 2px solid black; font-weight: bold; width: 300px; 
            display: inline-block; margin-top: 6px; font-size: 1.1em;
        }

        /* Статуси кольорів */
        .status-waiting { color: #888888; }
        .status-online { color: #08DD08; }
        .status-offline { color: #FF0000; }
        
        #status-text { font-size: 13px; font-weight: bold; margin-top: 6px; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>

        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 4px; padding-top: 4px; font-size: 1.1em;">
                Тиск: <span id="pres" class="sensor-value">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container">
            <div class="card">
                <span class="section-title">ВУЛИЦЯ</span>
                <div class="sensor-line"><img id="t_ext_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_ext" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_ext" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">BLE: <span id="rssi_ext">...</span></span>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <div class="battery-bar"><div id="bat_level_ext" class="battery-level"></div></div>
                        <span id="bat_text_ext" style="font-size: 0.7em; font-weight: bold;">...%</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <span class="section-title">КІМНАТА</span>
                <div class="sensor-line"><img id="t_room_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_room" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_room" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">BLE: <span id="rssi_room">...</span></span>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <div class="battery-bar"><div id="bat_level_room" class="battery-level"></div></div>
                        <span id="bat_text_room" style="font-size: 0.7em; font-weight: bold;">...%</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <span class="section-title">КУХНЯ</span>
                <div class="sensor-line"><img id="t_kit_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kit" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_kit" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">BLE: <span id="rssi_kit">...</span></span>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <div class="battery-bar"><div id="bat_level_kit" class="battery-level"></div></div>
                        <span id="bat_text_kit" style="font-size: 0.7em; font-weight: bold;">...%</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <span class="section-title">ВАННА</span>
                <div class="sensor-line"><img id="t_bath_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_bath" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_bath" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">BLE: <span id="rssi_bath">...</span></span>
                    <div style="display: flex; align-items: center; gap: 3px;">
                        <div class="battery-bar"><div id="bat_level_bath" class="battery-level"></div></div>
                        <span id="bat_text_bath" style="font-size: 0.7em; font-weight: bold;">...%</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="max-width: 180px; margin: 0 auto 5px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line"><img id="t_kor_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kor" class="sensor-value">...</span><span class="unit">°C</span></div>
            <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_kor" class="sensor-value">...</span><span class="unit">%</span></div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <a href="logs.html" class="btn">Журнал та графіки</a>
            <a href="index.html" class="btn">На головну</a>
        </div>

        <div id="status-text" class="status-waiting">Статус: Очікування даних...</div>
    </main>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const statusEl = document.getElementById('status-text');
        
        function formatTemp(value) {
            if (value === undefined || value === null || value === "...") return "...";
            let val = parseFloat(value);
            return val > 0 ? "+" + val.toFixed(1) : (val === 0 ? "0.0" : val.toFixed(1));
        }

        function updateTempIcon(id, value, iconId) {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            el.innerText = formatTemp(value);
            if (value !== "..." && value !== undefined) {
                icon.src = parseFloat(value) < 0 ? 'img/Temp_Low.png' : 'img/Temp_High.png';
            }
        }

        function updateBattery(levelId, textId, value) {
            const bar = document.getElementById(levelId);
            const text = document.getElementById(textId);
            if (!value && value !== 0) { text.innerText = "...%"; return; }
            text.innerText = value + '%';
            bar.style.width = value + '%';
            bar.style.backgroundColor = value <= 20 ? 'red' : value <= 50 ? 'orange' : '#00FF00';
        }

        client.on('connect', () => {
            client.subscribe('7091003_Checher_ESP32/all_data');
            statusEl.innerText = "Статус: Онлайн";
            statusEl.className = "status-online";
        });

        client.on('offline', () => {
            statusEl.innerText = "Статус: ESP32 Офлайн";
            statusEl.className = "status-offline";
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                document.getElementById('date').innerText = data.date || "...";
                document.getElementById('time').innerText = data.time || "...";
                document.getElementById('pres').innerText = data.korydor?.p || "...";

                updateTempIcon('t_ext', data.vulytsia?.t, 't_ext_icon');
                document.getElementById('h_ext').innerText = data.vulytsia?.h || "...";
                updateBattery('bat_level_ext', 'bat_text_ext', data.vulytsia?.b);
                document.getElementById('rssi_ext').innerText = data.vulytsia?.rssi ? data.vulytsia.rssi + " dBm" : "...";

                updateTempIcon('t_kor', data.korydor?.t, 't_kor_icon');
                document.getElementById('h_kor').innerText = data.korydor?.h || "...";

                updateTempIcon('t_room', data.room?.t, 't_room_icon');
                document.getElementById('h_room').innerText = data.room?.h || "...";
                updateBattery('bat_level_room', 'bat_text_room', data.room?.b);
                document.getElementById('rssi_room').innerText = data.room?.rssi ? data.room.rssi + " dBm" : "...";

                updateTempIcon('t_kit', data.kitchen?.t, 't_kit_icon');
                document.getElementById('h_kit').innerText = data.kitchen?.h || "...";
                updateBattery('bat_level_kit', 'bat_text_kit', data.kitchen?.b);
                document.getElementById('rssi_kit').innerText = data.kitchen?.rssi ? data.kitchen.rssi + " dBm" : "...";

                updateTempIcon('t_bath', data.bath?.t, 't_bath_icon');
                document.getElementById('h_bath').innerText = data.bath?.h || "...";
                updateBattery('bat_level_bath', 'bat_text_bath', data.bath?.b);
                document.getElementById('rssi_bath').innerText = data.bath?.rssi ? data.bath.rssi + " dBm" : "...";

            } catch (e) { console.error("Data error", e); }
        });
    </script>
</body>
</html>
