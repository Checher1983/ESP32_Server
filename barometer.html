<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Метеостанція - Оновлено</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        /* Твої стилі без змін */
        .status-online { color: #08DD08; font-weight: bold; }
        .status-offline { color: #FF0000; font-weight: bold; }
    </style>
</head>
<body>
    <div id="status-text">Статус: Підключення...</div>
    <script>
        const broker = "broker.emqx.io";
        const port = 8084;
        const topic = "7091003_Checher_ESP32/all_data";
        const clientID = "WebClient_" + Math.random().toString(16).substr(2, 8);

        const client = new Paho.MQTT.Client("wss://" + broker + ":" + port + "/mqtt", clientID);
        let lastUpdate = Date.now();

        client.onConnectionLost = (obj) => {
            document.getElementById('status-text').innerHTML = "Статус: Помилка зв'язку";
            document.getElementById('status-text').className = "status-offline";
            setTimeout(() => client.connect({onSuccess: onConnect, useSSL: true}), 5000);
        };

        client.onMessageArrived = (msg) => {
            try {
                const data = JSON.parse(msg.payloadString);
                lastUpdate = Date.now();
                updateUI(data);
            } catch (e) { console.error("JSON Error", e); }
        };

        function onConnect() {
            client.subscribe(topic);
            document.getElementById('status-text').innerHTML = "Статус: Онлайн";
            document.getElementById('status-text').className = "status-online";
        }

        function updateUI(data) {
            // Оновлюємо поля (приклади)
            if(data.date) document.getElementById('date').innerText = data.date;
            if(data.time) document.getElementById('time').innerText = data.time;
            if(data.korydor) {
                document.getElementById('t_kor').innerText = "+" + data.korydor.t;
                document.getElementById('pres').innerText = data.korydor.p;
            }
            // Аналогічно для всіх інших зон (kitchen, bath, room)
        }

        client.connect({onSuccess: onConnect, useSSL: true});

        // Таймер перевірки "смерті" ESP32
        setInterval(() => {
            if (Date.now() - lastUpdate > 30000) {
                document.getElementById('status-text').innerHTML = "Статус: ESP32 вимкнений";
                document.getElementById('status-text').className = "status-offline";
            }
        }, 10000);
    </script>
</body>
</html>
