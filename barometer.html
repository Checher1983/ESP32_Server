<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background-color: #E4EAF6; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: sans-serif; overflow-y: auto;
        }
        main { text-align: center; padding: 5px; width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 1.6em; margin: 0; padding-bottom: 5px; }
        .card {
            background-color: #B2F2BB; padding: 8px 10px; border-radius: 20px;
            margin-bottom: 6px; border: 1px solid #99d9a4; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .header-label { font-size: 1.2em; color: black; line-height: 1.3; }
        .header-value { color: red; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 5px; }
        .section-title {
            color: #21B1FF; font-weight: bold; text-decoration: underline;
            text-transform: uppercase; font-size: 1em; margin-bottom: 4px; display: block;
        }
        .sensor-line { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 3px 0; font-size: 1.3em; }
        .sensor-value { font-weight: bold; color: black; } 
        .unit { font-size: 0.8em; color: black; font-weight: bold; margin-left: -2px; }
        .icon-temp { width: 12px; height: auto; }
        .icon-drop { width: 22px; height: auto; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; padding-top: 4px; border-top: 1px solid rgba(0,0,0,0.1); }
        .battery-container { display: flex; align-items: center; gap: 2px; }
        .battery-body { width: 28px; height: 14px; border: 1.5px solid black; border-radius: 2px; position: relative; background: #eee; overflow: hidden; }
        .battery-level { height: 100%; width: 0%; transition: 0.5s; background-color: #ccc; }
        .battery-tip { width: 2px; height: 6px; background: black; border-radius: 0 1px 1px 0; }
        .rssi-text { font-size: 0.75em; color: #444; font-weight: bold; }
        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 12px; 
            border-radius: 15px; border: 2px solid black; font-weight: bold; width: 100%; 
            display: inline-block; margin-top: 8px; font-size: 1.1em;
        }
        .status-online { color: #08DD08; font-weight: bold; }
        .status-offline { color: #FF0000; font-weight: bold; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>

        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 5px; padding-top: 5px; font-size: 1.1em;">
                Тиск: <span id="pres" class="sensor-value" style="color:red;">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container">
            <div class="card">
                <span class="section-title">ВУЛИЦЯ</span>
                <div class="sensor-line"><img id="t_ext_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_ext" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_ext" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">📶 <span id="rssi_ext">...</span></span>
                    <div class="battery-container"><div class="battery-body"><div id="bat_l_ext" class="battery-level"></div></div><div class="battery-tip"></div><span id="bat_t_ext" style="font-size:0.7em; margin-left:2px;">...%</span></div>
                </div>
            </div>
            <div class="card">
                <span class="section-title">КІМНАТА</span>
                <div class="sensor-line"><img id="t_room_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_room" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_room" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">📶 <span id="rssi_room">...</span></span>
                    <div class="battery-container"><div class="battery-body"><div id="bat_l_room" class="battery-level"></div></div><div class="battery-tip"></div><span id="bat_t_room" style="font-size:0.7em; margin-left:2px;">...%</span></div>
                </div>
            </div>
            <div class="card">
                <span class="section-title">КУХНЯ</span>
                <div class="sensor-line"><img id="t_kit_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kit" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_kit" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">📶 <span id="rssi_kit">...</span></span>
                    <div class="battery-container"><div class="battery-body"><div id="bat_l_kit" class="battery-level"></div></div><div class="battery-tip"></div><span id="bat_t_kit" style="font-size:0.7em; margin-left:2px;">...%</span></div>
                </div>
            </div>
            <div class="card">
                <span class="section-title">ВАННА</span>
                <div class="sensor-line"><img id="t_bath_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_bath" class="sensor-value">...</span><span class="unit">°C</span></div>
                <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_bath" class="sensor-value">...</span><span class="unit">%</span></div>
                <div class="card-footer">
                    <span class="rssi-text">📶 <span id="rssi_bath">...</span></span>
                    <div class="battery-container"><div class="battery-body"><div id="bat_l_bath" class="battery-level"></div></div><div class="battery-tip"></div><span id="bat_t_bath" style="font-size:0.7em; margin-left:2px;">...%</span></div>
                </div>
            </div>
        </div>

        <div class="card" style="max-width: 200px; margin: 0 auto 10px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line"><img id="t_kor_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kor
