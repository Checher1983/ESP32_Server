<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { 
            background-color: #E4EAF6; 
            margin: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: sans-serif; overflow-y: auto; touch-action: pan-y;
        }
        main { text-align: center; padding: 5px; width: 100%; max-width: 400px; }
        
        h1 { color: #333; font-size: 1.6em; margin: 0; padding-bottom: 5px; }

        .card {
            background-color: #B2F2BB; padding: 6px 10px; border-radius: 20px;
            margin-bottom: 5px; border: 1px solid #99d9a4; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header-label { font-size: 1.2em; color: black; line-height: 1.3; }
        .header-value { color: red; font-weight: bold; }

        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 5px; }

        .section-title {
            color: #21B1FF; font-weight: bold; text-decoration: underline;
            text-transform: uppercase; font-size: 1em; margin-bottom: 4px; display: block;
        }

        .sensor-line { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 2px 0; font-size: 1.3em; }
        .sensor-value { font-weight: bold; }
        .unit { font-size: 0.8em; color: black; font-weight: bold; margin-left: -2px; }
        
        .icon-temp { width: 10px; height: auto; }
        .icon-drop { width: 20px; height: auto; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; padding-top: 3px; border-top: 1px solid rgba(0,0,0,0.05); }

        .battery-container { display: flex; align-items: center; gap: 1px; }
        .battery-body { width: 28px; height: 14px; border: 1.5px solid black; border-radius: 2px; position: relative; background: white; overflow: hidden; }
        .battery-level { height: 100%; width: 0%; transition: 0.5s; }
        .battery-tip { width: 2px; height: 6px; background: black; border-radius: 0 1px 1px 0; }
        .rssi-text { font-size: 0.75em; color: #444; font-weight: bold; }

        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; padding: 10px; 
            border-radius: 12px; border: 2px solid black; font-weight: bold; width: 300px; 
            display: inline-block; margin-top: 6px; font-size: 1.1em; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        .status-online { color: #08DD08; }
        .status-offline { color: #FF0000; }
        #status-text { font-size: 13px; font-weight: bold; margin-top: 6px; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>

        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 4px; padding-top: 4px; font-size: 1.1em;">
                Атмосферний тиск: <span id="pres" class="sensor-value" style="color:red;">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container">
            <script>
                const zones = [
                    {id: 'ext', name: 'ВУЛИЦЯ'}, {id: 'room', name: 'КІМНАТА'},
                    {id: 'kit', name: 'КУХНЯ'}, {id: 'bath', name: 'ВАННА'}
                ];
                zones.forEach(z => {
                    document.write(`
                        <div class="card">
                            <span class="section-title">${z.name}</span>
                            <div class="sensor-line">
                                <img id="t_${z.id}_icon" src="img/Temp_High.png" class="icon-temp">
                                <span id="t_${z.id}" class="sensor-value">...</span><span class="unit">°C</span>
                            </div>
                            <div class="sensor-line">
                                <img src="img/Drop.png" class="icon-drop">
                                <span id="h_${z.id}" class="sensor-value">...</span><span class="unit">%</span>
                            </div>
                            <div class="card-footer">
                                <span class="rssi-text">BLE: <span id="rssi_${z.id}">...</span></span>
                                <div class="battery-container">
                                    <div class="battery-body"><div id="bat_level_${z.id}" class="battery-level"></div></div>
                                    <div class="battery-tip"></div>
                                    <span id="bat_text_${z.id}" style="font-size: 0.7em; font-weight: bold; margin-left: 2px;">...%</span>
                                </div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="card" style="max-width: 180px; margin: 0 auto 5px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line">
                <img id="t_kor_icon" src="img/Temp_High.png" class="icon-temp">
                <span id="t_kor" class="sensor-value">...</span><span class="unit">°C</span>
            </div>
            <div class="sensor-line">
                <img src="img/Drop.png" class="icon-drop">
                <span id="h_kor" class="sensor-value">...</span><span class="unit">%</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center;">
            <a href="logs.html" class="btn">Журнал та графіки</a>
            <a href="index.html" class="btn">На головну</a>
        </div>
        <div id="status-text">Статус: Очікування даних...</div>
    </main>

    <script>
        const clientId = 'WebBarom_' + Math.random().toString(16).substr(2, 8);
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clientId: clientId });
        const statusEl = document.getElementById('status-text');
        let lastMsgTime = Date.now();

        function getTempColor(t) {
            if (t >= 33) return "#FF0000";
            if (t >= 27) return "#FF6A00";
            if (t >= 20) return "#007F0E";
            if (t >= 0)  return "#21B1FF";
            return "#0026FF";
        }

        function getHumColor(h) {
            if (h >= 91) return "#0026FF";
            if (h >= 71) return "#21B1FF";
            if (h >= 30) return "#007F0E";
            if (h >= 10) return "#FF6A00";
            return "#FF0000";
        }

        function formatTemp(value) {
            if (value === undefined || value === null || isNaN(parseFloat(value))) return "...";
            let val = parseFloat(value);
            return val > 0 ? "+" + val.toFixed(1) : (val === 0 ? "0.0" : val.toFixed(1));
        }

        function updateTemp(id, value, iconId) {
            const el = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (!el) return;
            const valStr = formatTemp(value);
            el.innerText = valStr;
            if (valStr !== "...") {
                const t = parseFloat(value);
                el.style.color = getTempColor(t);
                if(icon) icon.src = t < 0 ? 'img/Temp_Low.png' : 'img/Temp_High.png';
            }
        }

        function updateHum(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            if (value === undefined || value === null || isNaN(parseFloat(value))) {
                el.innerText = "..."; return;
            }
            const h = parseFloat(value);
            el.innerText = h;
            el.style.color = getHumColor(h);
        }

        function updateBattery(levelId, textId, value) {
            const bar = document.getElementById(levelId);
            const text = document.getElementById(textId);
            if (!bar || !text) return;
            if (value === undefined || value === null || isNaN(parseInt(value))) {
                text.innerText = "...%"; bar.style.width = "0%"; return;
            }
            let val = parseInt(value);
            text.innerText = val + '%';
            bar.style.width = val + '%';
            bar.style.backgroundColor = val >= 70 ? "#00FF00" : (val >= 20 ? "orange" : "red");
        }
