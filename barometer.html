<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Checher Meteo</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; }
        .container { max-width: 500px; margin: 20px auto; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; margin: 10px; border-radius: 15px; border-bottom: 4px solid #444; }
        .card.on { border-bottom-color: #4caf50; }
        .temp { font-size: 2.5em; font-weight: bold; color: #ff5252; }
        .label { font-size: 0.9em; color: #aaa; text-transform: uppercase; }
        #status { font-size: 0.8em; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="time">00:00:00</h2>
        
        <div class="card on">
            <div class="label">Коридор</div>
            <div id="t_kor" class="temp">--</div>
            <div id="h_kor">-- %</div>
        </div>

        <div class="card" id="c_ext"><div class="label">Вулиця</div><div id="t_ext" class="temp">--</div><div id="h_ext">--</div></div>
        <div class="card" id="c_room"><div class="label">Кімната</div><div id="t_room" class="temp">--</div><div id="h_room">--</div></div>
        <div class="card" id="c_kit"><div class="label">Кухня</div><div id="t_kit" class="temp">--</div><div id="h_kit">--</div></div>
        <div class="card" id="c_bath"><div class="label">Ванна</div><div id="t_bath" class="temp">--</div><div id="h_bath">--</div></div>
        
        <div id="status">Очікування MQTT...</div>
    </div>

<script>
    const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
    client.on('connect', () => {
        document.getElementById('status').innerText = "MQTT: Підключено";
        client.subscribe("7091003_Checher_ESP32/all_data");
    });

    client.on('message', (t, msg) => {
        const d = JSON.parse(msg.toString());
        document.getElementById('time').innerText = d.time;
        document.getElementById('t_kor').innerText = d.korydor?.t + "°C";
        document.getElementById('h_kor').innerText = d.korydor?.h + " %";

        const map = { vulytsia:'ext', room:'room', kitchen:'kit', bath:'bath' };
        Object.keys(map).forEach(key => {
            const id = map[key];
            const v = d[key];
            const el = document.getElementById('c_'+id);
            if(v) {
                document.getElementById('t_'+id).innerText = v.t + "°C";
                document.getElementById('h_'+id).innerText = v.h + " %";
                el.classList.add('on');
            } else {
                document.getElementById('t_'+id).innerText = "--";
                el.classList.remove('on');
            }
        });
    });
</script>
</body>
</html>
