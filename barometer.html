<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Метеостанція - ESP32</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * { user-select: none; -webkit-user-select: none; box-sizing: border-box; }
        body { background-color: #E4EAF6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; overflow-y: auto; }
        main { text-align: center; padding: 5px; width: 100%; max-width: 400px; }
        h1 { color: #333; font-size: 1.6em; margin: 0; padding-bottom: 5px; }
        .card { background-color: #B2F2BB; padding: 6px 10px; border-radius: 20px; margin-bottom: 5px; border: 1px solid #99d9a4; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-label { font-size: 1.2em; color: black; line-height: 1.3; }
        .header-value { color: red; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 5px; }
        .section-title { color: #21B1FF; font-weight: bold; text-decoration: underline; text-transform: uppercase; font-size: 1em; margin-bottom: 4px; display: block; }
        .sensor-line { display: flex; align-items: center; justify-content: center; gap: 4px; margin: 2px 0; font-size: 1.3em; }
        .sensor-value { font-weight: bold; }
        .unit { font-size: 0.8em; color: black; font-weight: bold; margin-left: -2px; }
        .icon-temp { width: 10px; height: auto; }
        .icon-drop { width: 20px; height: auto; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; padding-top: 3px; border-top: 1px solid rgba(0,0,0,0.05); }
        .battery-body { width: 28px; height: 14px; border: 1.5px solid black; border-radius: 2px; position: relative; background: white; overflow: hidden; }
        .battery-level { height: 100%; width: 0%; transition: 0.5s; }
        .battery-tip { width: 2px; height: 6px; background: black; border-radius: 0 1px 1px 0; }
        .btn { text-decoration: none; background-color: #21B1FF; color: yellow; padding: 10px; border-radius: 12px; border: 2px solid black; font-weight: bold; width: 300px; display: inline-block; margin-top: 6px; font-size: 1.1em; }
        .status-online { color: #08DD08; font-weight: bold; }
        .status-offline { color: #FF0000; font-weight: bold; }
    </style>
</head>
<body>
    <main>
        <h1>МЕТЕОСТАНЦІЯ</h1>
        <div class="card">
            <div class="header-label">Дата: <span id="date" class="header-value">...</span></div>
            <div class="header-label">Час: <span id="time" class="header-value">...</span></div>
            <div style="border-top: 1px dotted gray; margin-top: 4px; padding-top: 4px; font-size: 1.1em;">
                Атмосферний тиск: <span id="pres" class="sensor-value" style="color:red;">...</span> <span class="unit">мм.рт.ст.</span>
            </div>
        </div>

        <div class="grid-container">
            <script>
                const zones = [{id: 'ext', n: 'ВУЛИЦЯ'}, {id: 'room', n: 'КІМНАТА'}, {id: 'kit', n: 'КУХНЯ'}, {id: 'bath', n: 'ВАННА'}];
                zones.forEach(z => document.write(`
                    <div class="card">
                        <span class="section-title">${z.n}</span>
                        <div class="sensor-line"><img id="t_${z.id}_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_${z.id}" class="sensor-value">...</span><span class="unit">°C</span></div>
                        <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_${z.id}" class="sensor-value">...</span><span class="unit">%</span></div>
                        <div class="card-footer">
                            <span style="font-size:0.7em;">BLE: <span id="rssi_${z.id}">...</span></span>
                            <div style="display:flex; align-items:center; gap:1px;">
                                <div class="battery-body"><div id="bat_l_${z.id}" class="battery-level"></div></div>
                                <div class="battery-tip"></div>
                                <span id="bat_t_${z.id}" style="font-size: 0.7em; font-weight: bold; margin-left: 2px;">...%</span>
                            </div>
                        </div>
                    </div>`));
            </script>
        </div>

        <div class="card" style="max-width: 180px; margin: 0 auto 5px auto;">
            <span class="section-title">КОРИДОР</span>
            <div class="sensor-line"><img id="t_kor_icon" src="img/Temp_High.png" class="icon-temp"><span id="t_kor" class="sensor-value">...</span><span class="unit">°C</span></div>
            <div class="sensor-line"><img src="img/Drop.png" class="icon-drop"><span id="h_kor" class="sensor-value">...</span><span class="unit">%</span></div>
        </div>
        <a href="logs.html" class="btn">Журнал та графіки</a>
        <div id="status" class="status-offline" style="font-size:13px; margin-top:5px;">Статус: Очікування...</div>
    </main>

    <script>
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        const getTCol = (t) => t >= 30 ? "#f00" : t >= 24 ? "#ff6a00" : t >= 18 ? "#007f0e" : t >= 0 ? "#21b1ff" : "#0026ff";

        function upUI(id, val, icon) {
            const el = document.getElementById(id); if(!el) return;
            if(!val && val !== 0) { el.innerText = "..."; el.style.color = "black"; return; }
            let v = parseFloat(val);
            if(id.startsWith('t_')) { el.innerText = (v>0?"+":"")+v.toFixed(1); el.style.color = getTCol(v); if(icon) document.getElementById(icon).src = v<0?'img/Temp_Low.png':'img/Temp_High.png'; }
            else { el.innerText = val; el.style.color = "#007f0e"; }
        }

        function upBat(id, val) {
            const bar = document.getElementById('bat_l_'+id), txt = document.getElementById('bat_t_'+id);
            if(!bar || !txt) return;
            let b = parseInt(val);
            if(isNaN(b)) { txt.innerText="...%"; bar.style.width="0%"; bar.style.backgroundColor="#ccc"; return; }
            txt.innerText = b+"%"; bar.style.width = b+"%";
            bar.style.backgroundColor = b > 70 ? "#08dd08" : (b > 25 ? "#ffd700" : "#f00");
        }

        client.on('connect', () => client.subscribe('7091003_Checher_ESP32/all_data'));
        client.on('message', (t, m) => {
            try {
                const d = JSON.parse(m.toString());
                document.getElementById('status').innerText = "Статус: Онлайн"; document.getElementById('status').className = "status-online";
                document.getElementById('date').innerText = d.date || "...";
                document.getElementById('time').innerText = d.time || "...";
                document.getElementById('pres').innerText = d.korydor?.p || "...";

                upUI('t_kor', d.korydor?.t, 't_kor_icon'); upUI('h_kor', d.korydor?.h);
                const zones = {ext: d.vulytsia, room: d.room, kit: d.kitchen, bath: d.bath};
                Object.keys(zones).forEach(k => {
                    upUI('t_'+k, zones[k]?.t, 't_'+k+'_icon'); upUI('h_'+k, zones[k]?.h);
                    upBat(k, zones[k]?.b);
                    if(document.getElementById('rssi_'+k)) document.getElementById('rssi_'+k).innerText = zones[k]?.rssi || "...";
                });
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
