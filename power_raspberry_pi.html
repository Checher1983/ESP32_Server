      color:white;
      font-family:sans-serif;
      border:2px solid black;
      background:#d9534f;
    }

    .power-offline{ background:#d9534f; }
    .power-booting{ background:#e0b400; color:black; }
    .power-online{ background:#21B1FF; }

      justify-content:space-between;
      align-items:center;
      gap:8px;

      margin-top:6px;
      flex-wrap:wrap;
    }

    .value-green{ color:#007F0E; }
    .value-red{ color:red; }

      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:8px;
