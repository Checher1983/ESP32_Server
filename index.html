<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Server Index</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        /* Заборона виділення тексту для всього додатка */
        * {
            user-select: none;
            -webkit-user-select: none;
        }

        .btn {
            text-decoration: none; background-color: #21B1FF; color: yellow; 
            padding: 12px 10px; border-radius: 8px; border: 2px solid black; 
            font-weight: bold; width: 260px; display: inline-block;
            transition: 0.3s; text-align: center; cursor: pointer;
            font-family: sans-serif;
        }
        .btn:hover { background-color: #28a745; }
        .btn:active { background-color: yellow; color: #21B1FF; }
        #status-footer { font-size: 11px; font-weight: bold; color: gray; margin-top: 20px; font-family: sans-serif; }
    </style>
</head>
<body style="background-color: #E4EAF6; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">
    <main style="text-align: center; padding: 20px;">
        <header>
            <h1 style="color: #333;">ESP32 SERVER</h1>
        </header>
        <h3 style="color: black;">Дата: <span id="date-val" style="color: red; font-weight: bold;">...</span></h3>
        <h3 style="color: black; margin-bottom: 30px;">Час: <span id="time-val" style="color: red; font-weight: bold;">...</span></h3>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <a href="barometer.html" class="btn">Барометр</a>
            <div class="btn">Живлення Raspberry Pi 5</div>
            <div class="btn">Статистика відключень</div>
        </div>
        <div id="status-footer">Статус: <span id="mqtt-status">Підключення...</span></div>
    </main>

    <script>
        const statusText = document.getElementById('mqtt-status');
        const dateEl = document.getElementById('date-val');
        const timeEl = document.getElementById('time-val');
        
        let lastUpdate = Date.now();

        function startMQTT() {
            // Підключення до брокера через WebSocket
            const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
                clientId: 'WebClient_Index_' + Math.random().toString(16).substr(2, 8)
            });
            
            // НОВИЙ ТОПІК ДЛЯ JSON
            const topic = '7091003_Checher_ESP32/all_data';

            client.on('connect', () => {
                client.subscribe(topic);
            });

            client.on('message', (t, message) => {
                try {
                    // Парсинг JSON пакету
                    const data = JSON.parse(message.toString());
                    
                    lastUpdate = Date.now();
                    statusText.innerText = 'Онлайн';
                    statusText.parentElement.style.color = '#08DD08';

                    // Вивід дати та часу з JSON
                    dateEl.innerText = data.date;
                    timeEl.innerText = data.time;
                    
                } catch (e) {
                    console.error("Помилка парсингу JSON:", e);
                }
            });
        }

        // Перевірка активності (якщо даних немає більше 15 секунд)
        setInterval(() => {
            if (Date.now() - lastUpdate > 15000) {
                dateEl.innerText = "...";
                timeEl.innerText = "...";
                statusText.innerText = 'Офлайн (ESP32 вимкнена)';
                statusText.parentElement.style.color = 'red';
            }
        }, 5000);

        window.onload = () => { 
            if (typeof mqtt !== 'undefined') startMQTT(); 
        };
    </script>
</body>
</html>
